<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>豹豹子生日快乐</title>
  <style>
    :root{
      --bg1:#fff7f0; --bg2:#fde9f2; --ink:#2b2b2b; --muted:#666;
      --card:#ffffffcc; --shadow: 0 18px 60px rgba(0,0,0,.12);
      --radius: 18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; color:var(--ink);
      font-family: ui-serif, "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      background: radial-gradient(1200px 700px at 20% 10%, var(--bg2), transparent 60%),
                  radial-gradient(900px 600px at 80% 30%, #e9f2ff, transparent 60%),
                  linear-gradient(180deg, var(--bg1), #fff);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:22px;
    }
    .wrap{ width:min(720px, 100%); }
    .card{
      background:var(--card);
      border:1px solid rgba(0,0,0,.06);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .hero{
      position:relative;
      aspect-ratio: 16/10;
      background:#f3f3f3;
    }
    .hero img{
      width:100%; height:100%; object-fit:cover; display:block;
    }
    .content{ padding:18px 18px 14px; }
    h1{ margin:0 0 8px; font-size:28px; letter-spacing:.5px; }
    p{ margin:0; line-height:1.85; color:var(--ink); font-size:16px; }
    .meta{ margin-top:10px; color:var(--muted); font-size:13px; }
    .actions{
      display:flex; gap:10px; flex-wrap:wrap;
      padding:0 18px 18px;
    }
    button{
      appearance:none; border:1px solid rgba(0,0,0,.12);
      background:white; color:var(--ink);
      padding:10px 12px; border-radius:12px;
      font-size:14px; cursor:pointer;
    }
    button.primary{
      background:#1f2937; color:#fff; border-color:#1f2937;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <img src="assets/0a333c592899d756b82f2bed98269460.png" alt="照片" />
      </div>

      <div class="content">
        <h1>Let's 快乐！</h1>
        <p>
          祝亲爱的豹豹子大美女，我们的老赵——生日快乐呀～
          为了让你高兴，本猴和隔壁那只老狼可是操碎了心，因鄙人绘画能力实在太差，只能鞭笞chat同学进行绘画。
          感谢你这只优雅威武的豹子，十几年来都没有吃掉一直在你耳边叽叽喳喳的狼和猴（虽然这几年叽叽喳喳的有点少）。转眼间咱仨已经认识十四年了，虽然三个人在三个不同的地方，但友情的小火花依旧燃烧中🔥，真心不错之。
          最后祝你22岁生日快乐🎂，新的一岁希望你健康，吃嘛嘛香，每天能拥有充足的睡眠💤，少焦虑，早日暴富💰
        </p>
        <div class="meta">— 来自：老崔/老孙 · <span id="today"></span></div>
      </div>

      <div class="actions">
        <button class="primary" id="muteBtn">打开声音</button>
      </div>
    </div>

    <!-- 手机浏览器通常允许“静音自动播放”，不允许“带声音自动播放” -->
    <audio id="audio" src="assets/music.mp3" autoplay muted loop playsinline></audio>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const muteBtn = document.getElementById('muteBtn');

    function setLabel() {
      muteBtn.textContent = audio.muted ? '打开声音' : '静音';
    }

    async function tryAutoPlay() {
      try { await audio.play(); } catch (e) {}
    }

    // 进页面就尝试自动播放（通常会以“静音播放”成功）
    tryAutoPlay();

    // 如果某些机型没自动播，用户第一次触碰页面时再补一次
    window.addEventListener('pointerdown', tryAutoPlay, { once: true });

    muteBtn.addEventListener('click', async () => {
      audio.muted = !audio.muted;
      setLabel();
      if (!audio.paused) return;
      try { await audio.play(); } catch (e) {}
    });

    document.getElementById('today').textContent =
      new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });

    setLabel();
  </script>
</body>
</html>
